<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="My Clips">
  <title>My Clips</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Variables ───────────────────────────────────────────── */
    :root {
      --bg:          #F5F0EB;
      --surface:     #FFFFFF;
      --text:        #1C1C1E;
      --muted:       #6B6B72;
      --accent:      #B84C2A;
      --accent-bg:   #F5E9E4;
      --border:      #E8E2D8;
      --nav-h:       56px;
      --safe-b:      env(safe-area-inset-bottom, 0px);
      --r:           12px;
    }

    /* ── Reset ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-text-size-adjust: 100%;
    }

    #app {
      max-width: 680px;
      margin: 0 auto;
      min-height: 100dvh;
    }

    /* ── Header ──────────────────────────────────────────────── */
    #hdr {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245,240,235,.94);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 10px;
    }

    .hdr-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 9px;
    }

    #logo {
      font-family: 'Noto Serif JP', serif;
      font-size: 18px; font-weight: 600;
      color: var(--accent); flex: 1;
    }

    #back-btn {
      display: none; align-items: center; gap: 4px;
      background: none; border: none; cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px; color: var(--accent);
      padding: 2px 0; -webkit-tap-highlight-color: transparent;
    }
    #back-btn.on { display: flex; }

    .search-wrap { position: relative; }

    #q {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border); border-radius: 24px;
      padding: 8px 16px 8px 34px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
      color: var(--text); outline: none;
      transition: border-color .2s;
    }
    #q:focus { border-color: var(--accent); }
    #q::placeholder { color: var(--muted); }

    .q-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      font-size: 13px; pointer-events: none;
    }

    /* ── Main ────────────────────────────────────────────────── */
    #main {
      padding: 16px;
      padding-bottom: calc(var(--nav-h) + var(--safe-b) + 20px);
    }

    /* ── Section label ───────────────────────────────────────── */
    .sec {
      font-size: 11px; font-weight: 500; letter-spacing: .07em;
      text-transform: uppercase; color: var(--muted);
      margin: 16px 0 10px;
    }
    .sec:first-child { margin-top: 4px; }

    /* ── Cards grid ──────────────────────────────────────────── */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
    @media (max-width: 360px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface); border-radius: var(--r);
      border: 1px solid var(--border); overflow: hidden;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: transform .15s;
    }
    .card:active { transform: scale(.97); }

    .card-img {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      display: block; background: var(--bg);
    }

    .card-body { padding: 10px 12px 12px; }

    .card-nb {
      font-size: 10px; font-weight: 500; letter-spacing: .06em;
      color: var(--accent); text-transform: uppercase; margin-bottom: 3px;
    }

    .card-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 14px; font-weight: 600; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 5px;
    }

    .card-prev {
      font-size: 12px; color: var(--muted); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-date { font-size: 11px; color: var(--muted); margin-top: 7px; }

    /* ── List ────────────────────────────────────────────────── */
    .lst { display: flex; flex-direction: column; gap: 1px; }

    .li {
      background: var(--surface);
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background .1s;
    }
    .li:first-child  { border-radius: var(--r) var(--r) 0 0; }
    .li:last-child   { border-radius: 0 0 var(--r) var(--r); }
    .li:only-child   { border-radius: var(--r); }
    .li:active       { background: var(--accent-bg); }

    .li-thumb {
      width: 50px; height: 50px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0; background: var(--bg);
    }
    .li-icon {
      width: 50px; height: 50px; border-radius: 8px;
      background: var(--accent-bg); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .li-info { flex: 1; min-width: 0; }
    .li-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 15px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .li-sub {
      font-size: 12px; color: var(--muted); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chevron { color: var(--border); font-size: 18px; flex-shrink: 0; }

    /* ── Gallery ─────────────────────────────────────────────── */
    .gallery {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 3px;
    }
    .gal-item {
      aspect-ratio: 1; overflow: hidden;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .gal-item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: opacity .1s;
    }
    .gal-item:active img { opacity: .75; }

    /* ── Note detail ─────────────────────────────────────────── */
    .note-meta {
      background: var(--surface); border-radius: var(--r);
      padding: 16px; margin-bottom: 14px;
    }
    .note-meta-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 20px; font-weight: 600; line-height: 1.4; margin-bottom: 10px;
    }
    .badges { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .badge {
      background: var(--accent-bg); color: var(--accent);
      font-size: 11px; font-weight: 500;
      padding: 3px 8px; border-radius: 20px;
    }
    .badge-g { background: var(--bg); color: var(--muted); }
    .src-link {
      display: block; margin-top: 9px;
      font-size: 12px; color: var(--accent); text-decoration: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Markdown content ────────────────────────────────────── */
    .md {
      background: var(--surface); border-radius: var(--r);
      padding: 20px 16px;
      font-family: 'Noto Serif JP', serif;
      font-size: 15px; line-height: 1.8;
    }
    .md > *:first-child { margin-top: 0; }
    .md h1, .md h2 {
      font-size: 16px; font-weight: 600;
      margin: 22px 0 10px; padding-bottom: 6px;
      border-bottom: 1.5px solid var(--border);
      color: var(--accent);
    }
    .md h3 { font-size: 15px; font-weight: 600; margin: 16px 0 8px; }
    .md p  { margin: 9px 0; }
    .md ul, .md ol { padding-left: 22px; margin: 9px 0; }
    .md li { margin: 4px 0; }
    .md img {
      max-width: 100%; border-radius: 8px;
      margin: 12px 0; display: block;
    }
    .md a { color: var(--accent); }
    .md blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px; margin: 12px 0;
      color: var(--muted); font-style: italic;
    }
    .md table {
      width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 14px;
    }
    .md th, .md td { border: 1px solid var(--border); padding: 7px 10px; }
    .md th { background: var(--bg); font-weight: 600; }
    .md code {
      background: var(--bg); padding: 2px 5px; border-radius: 4px; font-size: 13px;
    }
    .md pre {
      background: var(--bg); padding: 14px; border-radius: 8px;
      overflow-x: auto; margin: 12px 0;
    }
    .md pre code { background: none; padding: 0; }

    /* ── Bottom nav ──────────────────────────────────────────── */
    #nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 680px;
      height: calc(var(--nav-h) + var(--safe-b));
      padding-bottom: var(--safe-b);
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex; align-items: flex-start; z-index: 200;
    }
    .ni {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 2px; padding: 9px 4px 0;
      background: none; border: none; cursor: pointer;
      color: var(--muted); transition: color .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .ni.on { color: var(--accent); }
    .ni-icon { font-size: 22px; line-height: 1; }
    .ni-label { font-size: 10px; font-family: 'Noto Sans JP', sans-serif; }

    /* ── States ──────────────────────────────────────────────── */
    .empty {
      text-align: center; padding: 56px 20px; color: var(--muted);
    }
    .empty .ei { font-size: 46px; margin-bottom: 10px; }
    .empty h3  { font-size: 16px; margin-bottom: 6px; }
    .empty p   { font-size: 13px; }

    .spin {
      width: 30px; height: 30px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: sp .7s linear infinite;
      margin: 56px auto;
    }
    @keyframes sp { to { transform: rotate(360deg); } }

    .cnt { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="hdr">
    <div class="hdr-row">
      <button id="back-btn" onclick="back()">‹ 戻る</button>
      <span id="logo">My Clips</span>
    </div>
    <div class="search-wrap">
      <span class="q-icon">🔍</span>
      <input id="q" type="search" placeholder="タイトル・内容を検索…"
             oninput="onQ(this.value)">
    </div>
  </div>

  <!-- Content -->
  <div id="main"><div class="spin"></div></div>

  <!-- Bottom nav -->
  <nav id="nav">
    <button class="ni on" id="n-home"      onclick="go('home')">
      <span class="ni-icon">🏠</span><span class="ni-label">ホーム</span>
    </button>
    <button class="ni"    id="n-notebooks" onclick="go('notebooks')">
      <span class="ni-icon">📓</span><span class="ni-label">ノート</span>
    </button>
    <button class="ni"    id="n-gallery"   onclick="go('gallery')">
      <span class="ni-icon">🖼</span><span class="ni-label">ギャラリー</span>
    </button>
    <button class="ni"    id="n-search"    onclick="focusQ()">
      <span class="ni-icon">🔍</span><span class="ni-label">検索</span>
    </button>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/minisearch@7/dist/umd/index.min.js"></script>
<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ★ CONFIG — ここだけ編集してください ★
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const CFG = {
  owner:  'eritsi',  // GitHubのユーザー名
  repo:   'evernote',        // リポジトリ名
};
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

// ── State ─────────────────────────────────────
const S = {
  notes: [],
  nbs: {},           // notebooks: {name: [note, …]}
  ms: null,          // MiniSearch
  view: 'home',
  nb: null,          // current notebook name
  hist: [],          // nav history
  noteCache: {},     // path → markdown text
};

// ── Notebook decoration ────────────────────────
const NB_ICON = {
  'レシピ':'🍳','中華レシピ':'🥢','tastytableレシピ':'🍽',
  'ル・クルーゼ':'🫕','宿':'🏨','馬車道':'🚋',
  'F1':'🏎','Carnet de notes de eritsi':'📒',
  'Google Professional Data Engineer':'☁️',
};
const NB_CLR = ['#E8F4F8','#F8EEE8','#EEF8EE','#F8F0E8','#EEE8F8','#F8EEF4'];

function nbIcon(n) { return NB_ICON[n] || '📁'; }
function nbClr(n) {
  let h = 0;
  for (const c of n) h = Math.imul(31,h) + c.charCodeAt(0)|0;
  return NB_CLR[Math.abs(h) % NB_CLR.length];
}

// ── Utils ──────────────────────────────────────
const eh = s => String(s||'')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const ea = s => eh(s).replace(/'/g,'&#39;');

function ep(p) {                         // URL-encode path segments
  return (p||'').split('/').map(encodeURIComponent).join('/');
}

function fmt(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

// ── Tokenizer (JP bigram + word) ───────────────
function tok(t) {
  const s = new Set();
  const l = (t||'').toLowerCase();
  l.split(/[\s\u3000]+/).filter(Boolean).forEach(w => s.add(w));
  for (let i = 0; i < l.length - 1; i++) s.add(l.slice(i, i+2));
  return [...s];
}

// ── Init ───────────────────────────────────────
async function init() {
  try {
    const r = await fetch('search-index.json');
    if (!r.ok) throw new Error('search-index.json が見つかりません（build_index.py を実行して commit してください）');
    const data = await r.json();
    S.notes = data.notes;

    S.notes.forEach(n => {
      (S.nbs[n.notebook] = S.nbs[n.notebook]||[]).push(n);
    });

    S.ms = new MiniSearch({
      fields: ['title','preview','notebook','tagsFlat'],
      storeFields: ['id'],
      tokenize: tok,
      searchOptions: { tokenize: tok, prefix: true, fuzzy: .1 },
    });
    S.ms.addAll(S.notes.map(n => ({ ...n, tagsFlat: (n.tags||[]).join(' ') })));

    showHome();
  } catch(e) {
    $main(`<div class="empty"><div class="ei">⚠️</div><h3>読み込み失敗</h3><p>${eh(e.message)}</p></div>`);
  }
}

// ── DOM helpers ────────────────────────────────
function $main(h)  { document.getElementById('main').innerHTML = h; }
function $logo(t)  { document.getElementById('logo').textContent = t; }
function $back(on) { document.getElementById('back-btn').classList.toggle('on', on); }

function $nav(id) {
  ['home','notebooks','gallery','search'].forEach(v =>
    document.getElementById(`n-${v}`)?.classList.toggle('on', v === id));
}

// ── Navigation ─────────────────────────────────
function go(view) {
  S.hist = [];
  $nav(view);
  if (view==='home')      showHome(false);
  else if (view==='notebooks') showNBs(false);
  else if (view==='gallery')   showGallery(false);
}

function focusQ() {
  $nav('search');
  document.getElementById('q').focus();
}

function back() {
  const prev = S.hist.pop();
  if (!prev) return;
  if (prev.v==='home')      showHome(false);
  else if (prev.v==='notebooks') showNBs(false);
  else if (prev.v==='nb')   showNB(prev.name, false);
  else if (prev.v==='gallery')   showGallery(false);
  else if (prev.v==='search')    showSearch(prev.q, false);
}

// ── Screens ────────────────────────────────────
function showHome(push=true) {
  if (push) S.hist = [];
  S.view = 'home';
  $logo('My Clips'); $back(false); $nav('home');

  const sorted = [...S.notes].sort((a,b) =>
    (b.updated||b.created||'') > (a.updated||a.created||'') ? 1 : -1);
  const withImg = sorted.filter(n => n.has_images);
  const noImg   = sorted.filter(n => !n.has_images);

  let h = '';
  if (withImg.length) {
    h += `<div class="sec">画像あり</div>
          <div class="grid">${withImg.slice(0,12).map(card).join('')}</div>`;
  }
  if (noImg.length) {
    h += `<div class="sec">テキストノート</div>
          <div class="lst">${noImg.slice(0,30).map(li).join('')}</div>`;
  }
  $main(h || `<div class="empty"><div class="ei">📭</div><h3>ノートがありません</h3></div>`);
}

function showNBs(push=true) {
  if (push) S.hist = [];
  S.view = 'notebooks';
  $logo('ノートブック'); $back(false); $nav('notebooks');

  const rows = Object.entries(S.nbs).map(([name, notes]) => `
    <div class="li" onclick="showNB('${ea(name)}')">
      <div class="li-icon" style="background:${nbClr(name)}">${nbIcon(name)}</div>
      <div class="li-info">
        <div class="li-title">${eh(name)}</div>
        <div class="li-sub">${notes.length} ノート</div>
      </div>
      <span class="chevron">›</span>
    </div>`).join('');

  $main(`<div class="lst">${rows}</div>`);
}

function showNB(name, push=true) {
  if (push) S.hist.push({v:'notebooks'});
  S.view = 'nb'; S.nb = name;
  $logo(name); $back(true); $nav('notebooks');

  const notes = (S.nbs[name]||[]).sort((a,b) =>
    (b.updated||b.created||'') > (a.updated||a.created||'') ? 1 : -1);

  $main(`<div class="lst">${notes.map(li).join('')}</div>`);
}

function showGallery(push=true) {
  if (push) S.hist = [];
  S.view = 'gallery';
  $logo('ギャラリー'); $back(false); $nav('gallery');

  const imgs = S.notes.filter(n => n.has_images);
  if (!imgs.length) {
    $main(`<div class="empty"><div class="ei">🖼</div><h3>画像のあるノートがありません</h3></div>`);
    return;
  }

  const items = imgs.map(n => `
    <div class="gal-item" onclick="openNote('${ea(n.id)}')">
      <img src="${ep(n.first_image)}" alt="${eh(n.title)}" loading="lazy">
    </div>`).join('');

  $main(`<div class="gallery">${items}</div>`);
}

// ── Search ─────────────────────────────────────
function onQ(v) {
  if (!v.trim()) { showHome(false); return; }
  showSearch(v, false);
}

function showSearch(q, push=true) {
  if (push) S.hist.push({v:S.view, name:S.nb, q});
  S.view = 'search';
  $logo('検索'); $back(true); $nav('search');

  if (!q.trim()) return;
  const res = S.ms.search(q);
  const hits = res.map(r => S.notes.find(n => n.id===r.id)).filter(Boolean);

  if (!hits.length) {
    $main(`<div class="empty"><div class="ei">🤷</div><h3>「${eh(q)}」は見つかりませんでした</h3></div>`);
    return;
  }

  $main(`<div class="cnt">${hits.length} 件</div><div class="lst">${hits.map(li).join('')}</div>`);
}

// ── Note detail ────────────────────────────────
async function openNote(id) {
  const note = S.notes.find(n => n.id === id);
  if (!note) return;

  S.hist.push({v:S.view, name:S.nb, q: document.getElementById('q').value});
  S.view = 'note';
  $logo(note.title); $back(true);

  $main(`<div class="spin"></div>`);

  try {
    // キャッシュ確認
    if (!S.noteCache[note.path]) {
      const r = await fetch(ep(note.path));
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      S.noteCache[note.path] = await r.text();
    }
    const raw = S.noteCache[note.path];

    // frontmatter 除去
    let body = raw;
    if (raw.startsWith('---')) {
      const e = raw.indexOf('\n---', 3);
      if (e !== -1) body = raw.slice(e + 4).trim();
    }
    // H1タイトルを除去（メタパネルで表示するため）
    body = body.replace(/^# .+\n?/, '');

    // カスタムレンダラー（画像URL修正）
    const rd = new marked.Renderer();
    const noteDir = note.note_dir;
    rd.image = (href, title, text) => {
      if (href && /^\.?\/images\//.test(href)) {
        href = ep(`${noteDir}/images/${href.split('/').pop()}`);
      }
      return `<img src="${eh(href)}" alt="${eh(text||'')}" loading="lazy">`;
    };

    const html = marked.parse(body, { renderer: rd });

    const tags = (note.tags||[]).map(t => `<span class="badge">${eh(t)}</span>`).join('');
    const src  = note.source_url
      ? `<a class="src-link" href="${eh(note.source_url)}" target="_blank" rel="noopener">🔗 ${eh(note.source_url)}</a>`
      : '';

    $main(`
      <div class="note-meta">
        <div class="note-meta-title">${eh(note.title)}</div>
        <div class="badges">
          <span class="badge">${nbIcon(note.notebook)} ${eh(note.notebook)}</span>
          ${tags}
          <span class="badge badge-g">📅 ${fmt(note.updated||note.created)}</span>
        </div>
        ${src}
      </div>
      <div class="md">${html}</div>
    `);
  } catch(e) {
    $main(`<div class="empty"><div class="ei">⚠️</div><h3>読み込みエラー</h3><p>${eh(e.message)}</p></div>`);
  }
}

// ── Card / List item renderers ─────────────────
function card(n) {
  const img = n.first_image
    ? `<img class="card-img" src="${ep(n.first_image)}" alt="${eh(n.title)}" loading="lazy">`
    : '';
  return `
    <div class="card" onclick="openNote('${ea(n.id)}')">
      ${img}
      <div class="card-body">
        <div class="card-nb">${nbIcon(n.notebook)} ${eh(n.notebook)}</div>
        <div class="card-title">${eh(n.title)}</div>
        <div class="card-prev">${eh(n.preview)}</div>
        <div class="card-date">${fmt(n.updated||n.created)}</div>
      </div>
    </div>`;
}

function li(n) {
  const thumb = n.first_image
    ? `<img class="li-thumb" src="${ep(n.first_image)}" alt="" loading="lazy">`
    : `<div class="li-icon">${nbIcon(n.notebook)}</div>`;
  return `
    <div class="li" onclick="openNote('${ea(n.id)}')">
      ${thumb}
      <div class="li-info">
        <div class="li-title">${eh(n.title)}</div>
        <div class="li-sub">${eh(n.preview)}</div>
      </div>
      <span class="chevron">›</span>
    </div>`;
}

// ── Boot ───────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
